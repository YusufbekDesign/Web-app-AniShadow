<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher AI - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Teacher AI</h1>
                <p class="subtitle">🎓 Innovatsion Ta'lim Platformasi</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Emailingizni kiriting"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Parol</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Parolingizni kiriting"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="login-btn">Kirish</button>

                <div class="info-box">
                    <p><strong>Test foydalanuvchi:</strong></p>
                    <p>Email: yusufbekdesign@gmail.com</p>
                    <p>Parol: 04042331Yusufbek</p>
                </div>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
